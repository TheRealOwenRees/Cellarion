services:
  mongo:
    image: mongo:7
    container_name: cellarion-mongo
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: cellarion-meilisearch
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_ENV=production
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.9.0
    container_name: cellarion-qdrant
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build: ./backend
    container_name: cellarion-backend
    environment:
      - MONGO_URI=mongodb://mongo:27017/winecellar
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - PORT=5000
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
      - MEILI_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - REMBG_URL=http://rembg:5000
      - MAILGUN_API_KEY=${MAILGUN_API_KEY:-}
      - MAILGUN_DOMAIN=${MAILGUN_DOMAIN:-}
      - MAILGUN_FROM=${MAILGUN_FROM:-}
      - MAILGUN_API_URL=${MAILGUN_API_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - QDRANT_URL=http://qdrant:6333
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-}
      - SUPER_ADMIN_IPS=${SUPER_ADMIN_IPS:-}
    volumes:
      - image-data:/app/uploads
    depends_on:
      mongo:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  rembg:
    build: ./rembg
    container_name: cellarion-rembg
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G

  frontend:
    build:
      context: ./frontend
      args:
        APP_VERSION: ${APP_VERSION:-dev}
    container_name: cellarion-frontend
    expose:
      - "80"
    networks:
      - web
      - default
    labels:
      traefik.enable: "true"
      traefik.docker.network: "web"
      traefik.http.routers.cellarion.rule: "Host(`cellarion.app`)"
      traefik.http.routers.cellarion.entrypoints: "web"
      traefik.http.services.cellarion.loadbalancer.server.port: "80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo-data:
  meili-data:
  qdrant-data:
  image-data:

networks:
  web:
    external: true
