name: Build Docker images on Release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare variables (lowercase owner + normalized tag)
        id: vars
        shell: bash
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG_RAW="${{ github.ref_name }}"         # e.g. v0.2.1 or 0.2.1
          TAG="${TAG_RAW#v}"                       # strip leading v if present
          echo "owner=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Backend
      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/cellarion-backend:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ steps.vars.outputs.owner }}/cellarion-backend:latest

      # Frontend
      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/cellarion-frontend:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ steps.vars.outputs.owner }}/cellarion-frontend:latest

      # rembg
      - name: Build & push rembg
        uses: docker/build-push-action@v6
        with:
          context: ./rembg
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/cellarion-rembg:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ steps.vars.outputs.owner }}/cellarion-rembg:latest
