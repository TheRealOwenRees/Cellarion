map $http_user_agent $is_crawler {
    default                 0;
    ~*Twitterbot            1;
    ~*facebookexternalhit   1;
    ~*LinkedInBot           1;
    ~*WhatsApp              1;
    ~*Discordbot            1;
    ~*TelegramBot           1;
    ~*Slackbot              1;
    ~*Googlebot             1;
    ~*bingbot               1;
    ~*Applebot              1;
}

server {
    listen 80;
    server_name _;

    # Allow large uploads (bottle images)
    client_max_body_size 50m;

    # Proxy all /api/ requests to the Express backend.
    # ^~ ensures this prefix match wins over the static-file regex below,
    # so /api/uploads/processed/*.png is proxied, not served as static.
    location ^~ /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Extended timeout for rembg background-removal (can be slow on first run)
        proxy_read_timeout 120s;
    }

    # Rewrite sitemap.xml to /api/ path so it flows through the existing proxy
    location = /sitemap.xml {
        rewrite ^ /api/sitemap.xml break;
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Social media crawlers on /wines/* get server-rendered OG meta tags
    # from the backend instead of the SPA (crawlers don't execute JS).
    # Uses an internal location to avoid the nginx "if is evil" pitfall.
    location ~ "^/wines/([a-f0-9]{24})$" {
        if ($is_crawler) {
            rewrite ^/wines/(.+)$ /api/og/wines/$1 last;
        }
        # Real users get the SPA
        root       /usr/share/nginx/html;
        try_files  /index.html =404;
    }

    # Internal: proxied OG requests rewritten from /wines/* above
    location ^~ /api/og/ {
        internal;
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Serve the React SPA — fall back to index.html for client-side routing
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root              /usr/share/nginx/html;
        expires           1y;
        add_header        Cache-Control "public, immutable";
        try_files         $uri =404;
    }
}
