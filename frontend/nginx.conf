map $http_user_agent $is_crawler {
    default                 0;
    ~*Twitterbot            1;
    ~*facebookexternalhit   1;
    ~*LinkedInBot           1;
    ~*WhatsApp              1;
    ~*Discordbot            1;
    ~*TelegramBot           1;
    ~*Slackbot              1;
    ~*Googlebot             1;
    ~*bingbot               1;
    ~*Applebot              1;
}

server {
    listen 80;
    server_name _;

    # Allow large uploads (bottle images)
    client_max_body_size 50m;

    # Gzip compression — reduces transfer size for JS/CSS/JSON
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Proxy all /api/ requests to the Express backend.
    # ^~ ensures this prefix match wins over the static-file regex below,
    # so /api/uploads/processed/*.png is proxied, not served as static.
    location ^~ /api/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Extended timeout for rembg background-removal (can be slow on first run)
        proxy_read_timeout 120s;
    }

    # Rewrite sitemap.xml to /api/ path so it flows through the existing proxy
    location = /sitemap.xml {
        rewrite ^ /api/sitemap.xml break;
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # IndexNow key verification file — proxy to backend
    location ~ "^/[a-f0-9]{32}\.txt$" {
        rewrite ^(.*)$ /api$1 break;
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Search engine crawlers get server-rendered HTML with full content,
    # structured data (JSON-LD), and meta tags from the backend OG endpoints.
    # Real users get the SPA as usual. Uses $is_crawler map variable.

    # Wine detail pages — /wines/<ObjectId>
    location ~ "^/wines/([a-f0-9]{24})$" {
        error_page 418 = @wine_og;
        if ($is_crawler) {
            return 418;
        }
        # Real users get the SPA
        root       /usr/share/nginx/html;
        try_files  /index.html =404;
    }

    location @wine_og {
        rewrite ^/wines/(.+)$ /api/og/wines/$1 break;
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Blog post pages — /blog/<slug>
    location ~ "^/blog/([a-z0-9]+(?:-[a-z0-9]+)*)$" {
        error_page 418 = @blog_og;
        if ($is_crawler) {
            return 418;
        }
        root       /usr/share/nginx/html;
        try_files  /index.html =404;
    }

    location @blog_og {
        rewrite ^/blog/(.+)$ /api/og/blog/$1 break;
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Serve the React SPA — fall back to index.html for client-side routing
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root              /usr/share/nginx/html;
        expires           1y;
        add_header        Cache-Control "public, immutable";
        try_files         $uri =404;
    }
}
