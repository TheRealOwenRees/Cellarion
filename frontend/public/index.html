<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#FAF8F6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#121212" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Cellarion — the open-source wine cellar manager. Track bottles, visualise racks, get drink-window alerts, and share cellars. Self-hosted or use cellarion.app." />
    <meta name="keywords" content="wine cellar management, wine tracking, bottle tracker, wine collection, open source wine app, self-hosted wine cellar, drink window, wine rack" />

    <!-- Preload LCP logo (WebP with PNG fallback) so browser discovers it before React renders -->
    <link rel="preload" as="image" href="%PUBLIC_URL%/cellarion-logo-light.webp" type="image/webp" media="(prefers-color-scheme: light)" fetchpriority="high" />
    <link rel="preload" as="image" href="%PUBLIC_URL%/cellarion-logo-dark.webp"  type="image/webp" media="(prefers-color-scheme: dark)"  fetchpriority="high" />

    <!-- Fonts: Playfair Display (headings) + Inter (body) -->
    <!-- preload downloads the CSS early; the stylesheet link is non-blocking because it hits cache immediately -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet" />

    <!-- Open Graph / Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cellarion — Wine Cellar Management" />
    <meta property="og:description" content="The open-source, self-hosted wine cellar manager. Track bottles, visualise racks, and get drink-window alerts." />
    <meta property="og:image" content="%PUBLIC_URL%/cellarion-logo.jpg" />
    <meta property="og:url" content="https://cellarion.app" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cellarion — Wine Cellar Management" />
    <meta name="twitter:description" content="The open-source, self-hosted wine cellar manager. Track bottles, visualise racks, and get drink-window alerts." />
    <meta name="twitter:image" content="%PUBLIC_URL%/cellarion-logo.jpg" />

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' blob: data: https:; connect-src 'self' https://open.er-api.com; frame-src https://www.youtube.com https://www.youtube-nocookie.com;" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cellarion" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>Cellarion — Wine Cellar Management</title>
  </head>
  <body>
    <noscript>
      <h1>Cellarion — Wine Cellar Management</h1>
      <p>The open-source, self-hosted wine cellar manager. Track bottles, visualise racks, get drink-window alerts, and share cellars.</p>
    </noscript>
    <!-- SEO: visible h1 for crawlers that don't render JS. React removes #preboot-heading on mount. -->
    <div id="preboot-heading" aria-hidden="true" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">
      <h1>Cellarion — Wine Cellar Management</h1>
    </div>
    <!--
      Static LCP logo: paints immediately before React boots.
      Removed by React in index.js after first render.
    -->
    <style>#preboot-logo{display:flex;padding:12px 16px}</style>
    <div id="preboot-logo" aria-hidden="true">
      <picture>
        <source srcset="%PUBLIC_URL%/cellarion-logo-light.webp" type="image/webp" media="(prefers-color-scheme: light)" />
        <source srcset="%PUBLIC_URL%/cellarion-logo-dark.webp"  type="image/webp" media="(prefers-color-scheme: dark)" />
        <source srcset="%PUBLIC_URL%/cellarion-logo-light.png" media="(prefers-color-scheme: light)" />
        <source srcset="%PUBLIC_URL%/cellarion-logo-dark.png"  media="(prefers-color-scheme: dark)" />
        <img src="%PUBLIC_URL%/cellarion-logo-light.webp" alt="Cellarion" width="159" height="128" fetchpriority="high" style="height:64px;width:auto" />
      </picture>
    </div>
    <div id="root"></div>
  </body>
</html>
