<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d0d0d" />
    <title>Cellarion — Offline</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
        background: #FAF8F6;
        color: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #121212; color: #e0e0e0; }
        .card { background: #1e1e1e; }
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 3rem 2rem;
        max-width: 400px;
        box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      }
      .icon { font-size: 3rem; margin-bottom: 1rem; }
      h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
      p { color: #666; line-height: 1.6; margin-bottom: 1.5rem; }
      @media (prefers-color-scheme: dark) { p { color: #999; } }
      button {
        background: #7c3aed;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.75rem 2rem;
        font-size: 1rem;
        cursor: pointer;
      }
      button:hover { background: #6d28d9; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">&#127863;</div>
      <h1>You're offline</h1>
      <p>Cellarion needs an internet connection to load your cellar. Please check your connection and try again.</p>
      <button onclick="window.location.reload()">Try again</button>
    </div>
  </body>
</html>
